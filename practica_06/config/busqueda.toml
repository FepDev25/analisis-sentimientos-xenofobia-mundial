[ventana]
# Ventana temporal de recolección (ISO 8601). El filtrado por fecha se hace
# del lado cliente porque no todas las redes lo permiten en la búsqueda.
inicio = "2026-05-11"      # capa previa (buildup)
fin    = "2026-07-19"      # final del torneo

# Hashtags de torneo (búsqueda global en Bluesky y TikTok).
hashtags_torneo = ["#WorldCup2026", "#FIFAWorldCup", "#Mundial2026", "#WC26"]

# Hashtags de partido: código FIFA de 3 letras por selección.
hashtags_partido = ["#ARGMEX", "#BRAJPN", "#FRAESP", "#ECUURU", "#MEXARG"]

# Selecciones (multiidioma) que suelen concentrar carga xenófoba.
selecciones = ["Brasil", "Brazil", "Japón", "Japan", "Argentina", "Marruecos", 
               "México", "Mexico", "Francia", "France", "Ecuador", "Uruguay"]

# Jugadores mediáticos (generan alto tráfico).
jugadores = ["Mbappé", "Messi", "Vinicius"]

[youtube]
# Alcance por canal/video/playlist: canales oficiales de resúmenes de goles.
canales   = []             # ej. ["@FIFA", "@ESPNDeportes"]
videos    = []             # IDs o URLs de videos concretos
# Playlists (se expanden a videos automáticamente con yt-dlp).
playlists = [
  "https://www.youtube.com/playlist?list=PLTRckBbIqcx2yV1NYqGnx6RBX4RpNFRCs",  # ESPN Fans - resúmenes
]
# Pausa (segundos) entre videos: baja el ritmo para no gatillar el throttle de
# YouTube (sin API key). Súbela si vuelve a aparecer "Failed to set sorting".
pausa_videos = 2.0

[reddit]
# ❌ DESCARTADO (13-jul-2026). Reddit responde 403 al acceso programático desde su
# propia CDN (www y old, con y sin User-Agent de navegador) y su registro de apps
# ya no emite credenciales. Se conserva la config como evidencia de la decisión.
# Reemplazado por Bluesky (protocolo abierto AT).
subreddits = ["soccer", "worldcup", "argentina", "brasil", "ecuador"]

[bluesky]
# Red social sobre el protocolo abierto AT. API oficial; la BÚSQUEDA requiere
# sesión → cuenta gratuita + app password (instantáneo, sin aprobación manual).
# Credenciales en .env: BLUESKY_HANDLE / BLUESKY_APP_PASSWORD
# Alcance: búsqueda global por texto.
# Idiomas a los que se acota la búsqueda (el tema es interétnico y multiidioma).
idiomas = ["es", "pt", "en"]
# Tope de consultas 'dirigida' (evento × léxico). El producto cartesiano completo
# son miles de queries: se corta aquí para que la corrida termine en minutos.
# Se recorre intercalando por término del léxico, así el recorte sigue cubriendo
# TODAS las selecciones (ver Config.criterios_dirigida).
max_criterios_dirigida = 120

[limites]
# Topes de volumen. Suben el tamaño del dataset a costa de más tiempo de red.
# - max_por_criterio: comentarios por VIDEO (query). 1500 ≈ "casi todo el video"
# - max_total_por_red: tope global de la red (freno de mano por si la playlist es enorme)
max_por_criterio = 2000
max_total_por_red = 1000000
max_videos = 30
[x]
# Extractor de X con Playwright (navegador logueado). Ver extractores/x.py.
# La sesión se captura una vez: `uv run --group x python scripts/recoleccion_x.py --login`
sesion = "data/x_session.json"
# X detecta headless con facilidad; headful (false) evade mejor el anti-bot.
headless = false
# Cortar una query tras N scrolls seguidos sin tweets nuevos (fin/stall).
scrolls_sin_avance = 5
# Pausa (s) entre queries, anti-throttle.
pausa = 2.0

[tumblr]
# Tumblr busca por etiquetas, no por consultas de texto libre.
# Se combinan etiquetas directamente relacionadas con discriminación
# y etiquetas futbolísticas de alto volumen.
etiquetas = [
  "racismo",
  "racism",
  "xenophobia",
  "xenofobia",
  "football racism",
  "racial abuse",
  "racist football",
  "anti racism",
  "world cup",
  "world cup 2026",
  "fifa world cup",
  "mundial 2026",
  "football",
  "futbol",
  "futebol",
  "soccer",
  "Mbappe",
  "Messi",
  "Vinicius",
  "Argentina",
  "Brasil",
  "Brazil",
  "Mexico",
  "France",
  "Japan",
  "Morocco"
]

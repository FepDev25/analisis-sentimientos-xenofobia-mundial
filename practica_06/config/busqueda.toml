[ventana]
# Ventana temporal de recolección (ISO 8601). El filtrado por fecha se hace
# del lado cliente porque no todas las redes lo permiten en la búsqueda.
inicio = "2026-05-11"      # capa previa (buildup)
fin    = "2026-07-19"      # final del torneo

# Hashtags de torneo (búsqueda global en X y TikTok).
hashtags_torneo = ["#WorldCup2026", "#FIFAWorldCup", "#Mundial2026", "#WC26"]

# Hashtags de partido: código FIFA de 3 letras por selección.
hashtags_partido = ["#ARGMEX", "#BRAJPN", "#FRAESP", "#ECUURU", "#MEXARG"]

# Selecciones (multiidioma) que suelen concentrar carga xenófoba.
selecciones = ["Brasil", "Brazil", "Japón", "Japan", "Argentina", "Marruecos", 
               "México", "Mexico", "Francia", "France", "Ecuador", "Uruguay"]

# Jugadores mediáticos (generan alto tráfico).
jugadores = ["Mbappé", "Messi", "Vinicius"]

[youtube]
# Alcance por canal/video/playlist: canales oficiales de resúmenes de goles.
canales   = []             # ej. ["@FIFA", "@ESPNDeportes"]
videos    = []             # IDs o URLs de videos concretos
# Playlists (se expanden a videos automáticamente con yt-dlp).
playlists = [
  "https://www.youtube.com/playlist?list=PLTRckBbIqcx2yV1NYqGnx6RBX4RpNFRCs",  # ESPN Fans - resúmenes
]
# Pausa (segundos) entre videos: baja el ritmo para no gatillar el throttle de
# YouTube (sin API key). Súbela si vuelve a aparecer "Failed to set sorting".
pausa_videos = 2.0

[reddit]
# Respaldo de X: búsqueda por subreddit.
subreddits = ["soccer", "worldcup", "argentina", "brasil", "ecuador"]

[limites]
# Topes de volumen. Suben el tamaño del dataset a costa de más tiempo de red.
# - max_por_criterio: comentarios por VIDEO (query). 1500 ≈ "casi todo el video"
# - max_total_por_red: tope global de la red (freno de mano por si la playlist es enorme)
max_por_criterio = 2000
max_total_por_red = 1000000
max_videos = 30